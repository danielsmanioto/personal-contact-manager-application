version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: contact-manager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contact_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contact-manager-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contact-manager-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contact_manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contact-manager-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: contact-manager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - contact-manager-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  contact-manager-net:
    driver: bridge
