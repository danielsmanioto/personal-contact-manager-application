version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: contact-manager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contact_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contact-manager-net

  mongo:
    image: mongo:latest
    container_name: alert-service-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DB: alert_manager
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contact-manager-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contact-manager-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contact_manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      ALERT_SERVICE_URL: http://alert-service:8082
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      alert-service:
        condition: service_healthy
    networks:
      - contact-manager-net
    restart: unless-stopped

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    container_name: alert-service
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/alert_manager
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - contact-manager-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8081/api
    container_name: contact-manager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - alert-service
    networks:
      - contact-manager-net
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:

networks:
  contact-manager-net:
    driver: bridge
