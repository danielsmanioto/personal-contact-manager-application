spring:
  application:
    name: personal-contact-manager-test

  datasource:
    url: jdbc:postgresql://localhost:5432/contact_manager_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    root: WARN
    com.contactmanager: INFO
    org.springframework: WARN
    org.hibernate: WARN
